name: Deploy to Xserver

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-xserver-main
  cancel-in-progress: true

jobs:
  deploy-public:
    name: Deploy public_html
    runs-on: ubuntu-latest

    steps:
      - name: Checkout latest main
        uses: actions/checkout@v4

      - name: Upload public_html files
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.XSERVER_FTP_HOST }}
          username: ${{ secrets.XSERVER_FTP_USER }}
          password: ${{ secrets.XSERVER_FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./public_html/shohousen/
          server-dir: ${{ secrets.XSERVER_PUBLIC_DIR }}
          state-name: .ftp-deploy-sync-state-public.json
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/*.zip
            **/storage/**
            **/uploads/**
            **/*.log
            **/tmp/**

  deploy-private:
    name: Deploy private app
    runs-on: ubuntu-latest
    needs: deploy-public

    steps:
      - name: Checkout latest main
        uses: actions/checkout@v4

      - name: Upload private files
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.XSERVER_FTP_HOST }}
          username: ${{ secrets.XSERVER_FTP_USER }}
          password: ${{ secrets.XSERVER_FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./private/shohousen/
          server-dir: ${{ secrets.XSERVER_PRIVATE_DIR }}
          state-name: .ftp-deploy-sync-state-private-v3.json
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/*.zip
            **/storage/**
            **/uploads/**
            **/*.log
            **/tmp/**
            **/config/config.php
            **/config/config - コピー*.php
            **/config/*.local.php
            **/.env

  notify-deploy-result:
    name: Notify deploy result to Chatwork
    runs-on: ubuntu-latest
    needs:
      - deploy-public
      - deploy-private
    if: always() && vars.CHATWORK_DEPLOY_NOTIFY_ENABLED != 'false'

    steps:
      - name: Send deploy result notification
        env:
          CHATWORK_API_TOKEN: ${{ secrets.CHATWORK_DEPLOY_API_TOKEN || secrets.CHATWORK_API_TOKEN }}
          CHATWORK_ROOM_ID: ${{ secrets.CHATWORK_DEPLOY_ROOM_ID || secrets.CHATWORK_ROOM_ID }}
          PUBLIC_RESULT: ${{ needs.deploy-public.result }}
          PRIVATE_RESULT: ${{ needs.deploy-private.result }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          ACTOR: ${{ github.actor }}
          REPOSITORY: ${{ github.repository }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$CHATWORK_API_TOKEN" ] || [ -z "$CHATWORK_ROOM_ID" ]; then
            echo "Chatwork deploy notification secrets are not set. Skipping notification."
            exit 0
          fi

          SHORT_SHA="${COMMIT_SHA:0:7}"
          MESSAGE_TEXT="${COMMIT_MESSAGE:-manual run}"

          if [ "$PUBLIC_RESULT" = "success" ] && [ "$PRIVATE_RESULT" = "success" ]; then
            TITLE="【GitHub】Xserver自動アップロード完了"
            STATUS="成功"
          else
            TITLE="【GitHub】Xserver自動アップロード失敗"
            STATUS="失敗"
          fi

          MESSAGE="[info][title]${TITLE}[/title]
          種別: main差分FTPアップロード
          リポジトリ: ${REPOSITORY}
          実行者: ${ACTOR}
          結果: ${STATUS}
          public_html: ${PUBLIC_RESULT}
          private: ${PRIVATE_RESULT}
          commit: ${SHORT_SHA}
          message: ${MESSAGE_TEXT}
          Actions: ${RUN_URL}
          [/info]"

          curl --fail-with-body -X POST \
            -H "x-chatworktoken: ${CHATWORK_API_TOKEN}" \
            --data-urlencode "body=${MESSAGE}" \
            "https://api.chatwork.com/v2/rooms/${CHATWORK_ROOM_ID}/messages"

name: Deploy to Xserver

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-xserver-main
  cancel-in-progress: true

jobs:
  deploy-public:
    name: Deploy public_html
    runs-on: ubuntu-latest

    steps:
      - name: Checkout latest main
        uses: actions/checkout@v4

      - name: Generate deploy info
        run: |
          mkdir -p ./public_html/shohousen
          cat > ./public_html/shohousen/deploy_info.json <<EOF
          {
            "repository": "${GITHUB_REPOSITORY}",
            "branch": "${GITHUB_REF_NAME}",
            "commit": "${GITHUB_SHA}",
            "commit_short": "${GITHUB_SHA::7}",
            "actor": "${GITHUB_ACTOR}",
            "run_id": "${GITHUB_RUN_ID}",
            "run_url": "https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}",
            "deployed_at": "$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          }
          EOF

      - name: Upload public_html files
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.XSERVER_FTP_HOST }}
          username: ${{ secrets.XSERVER_FTP_USER }}
          password: ${{ secrets.XSERVER_FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./public_html/shohousen/
          server-dir: ${{ secrets.XSERVER_PUBLIC_DIR }}
          state-name: .ftp-deploy-sync-state-public-v4.json
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/*.zip
            **/storage/**
            **/uploads/**
            **/*.log
            **/tmp/**

  deploy-private:
    name: Deploy private app
    runs-on: ubuntu-latest
    needs: deploy-public

    steps:
      - name: Checkout latest main
        uses: actions/checkout@v4

      - name: Upload private files
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.XSERVER_FTP_HOST }}
          username: ${{ secrets.XSERVER_FTP_USER }}
          password: ${{ secrets.XSERVER_FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./private/shohousen/
          server-dir: ${{ secrets.XSERVER_PRIVATE_DIR }}
          state-name: .ftp-deploy-sync-state-private-v4.json
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/*.zip
            **/storage/**
            **/uploads/**
            **/*.log
            **/tmp/**
            **/config/config.php
            **/config/config - コピー*.php
            **/config/*.local.php
            **/.env

  notify-deploy-result:
    name: Notify deploy result to Chatwork
    runs-on: ubuntu-latest
    needs:
      - deploy-public
      - deploy-private
    if: always() && vars.CHATWORK_DEPLOY_NOTIFY_ENABLED != 'false'

    steps:
      - name: Send deploy result notification
        env:
          CHATWORK_API_TOKEN: ${{ secrets.CHATWORK_DEPLOY_API_TOKEN || secrets.CHATWORK_API_TOKEN }}
          CHATWORK_ROOM_ID: ${{ secrets.CHATWORK_DEPLOY_ROOM_ID || secrets.CHATWORK_ROOM_ID }}
          DEPLOY_INFO_URL: ${{ secrets.XSERVER_DEPLOY_INFO_URL }}
          PUBLIC_RESULT: ${{ needs.deploy-public.result }}
          PRIVATE_RESULT: ${{ needs.deploy-private.result }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          ACTOR: ${{ github.actor }}
          REPOSITORY: ${{ github.repository }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$CHATWORK_API_TOKEN" ] || [ -z "$CHATWORK_ROOM_ID" ]; then
            echo "Chatwork deploy notification secrets are not set. Skipping notification."
            exit 0
          fi

          SHORT_SHA="${COMMIT_SHA:0:7}"
          MESSAGE_TEXT="${COMMIT_MESSAGE:-manual run}"
          VERIFY_RESULT="未実施"
          VERIFY_DETAIL="XSERVER_DEPLOY_INFO_URL 未設定"
          OVERALL_STATUS="成功"
          TITLE="【GitHub】Xserver自動アップロード完了"

          if [ -n "$DEPLOY_INFO_URL" ]; then
            VERIFY_BODY="$(curl -fsSL "${DEPLOY_INFO_URL}?v=${COMMIT_SHA}" || true)"
            if echo "$VERIFY_BODY" | grep -q "$COMMIT_SHA"; then
              VERIFY_RESULT="成功"
              VERIFY_DETAIL="Web上の deploy_info.json が今回commitと一致"
            else
              VERIFY_RESULT="失敗"
              VERIFY_DETAIL="FTPは完了扱いだが、Web上の deploy_info.json が今回commitと一致しません"
            fi
          fi

          if [ "$PUBLIC_RESULT" != "success" ] || [ "$PRIVATE_RESULT" != "success" ]; then
            OVERALL_STATUS="失敗"
            TITLE="【GitHub】Xserver自動アップロード失敗"
          elif [ "$VERIFY_RESULT" = "失敗" ]; then
            OVERALL_STATUS="FTP成功・Web反映確認失敗"
            TITLE="【GitHub】Xserver反映確認に失敗"
          fi

          MESSAGE="[info][title]${TITLE}[/title]
          種別: main差分FTPアップロード
          リポジトリ: ${REPOSITORY}
          実行者: ${ACTOR}
          結果: ${OVERALL_STATUS}
          public_html: ${PUBLIC_RESULT}
          private: ${PRIVATE_RESULT}
          Web反映確認: ${VERIFY_RESULT}
          詳細: ${VERIFY_DETAIL}
          commit: ${SHORT_SHA}
          message: ${MESSAGE_TEXT}
          deploy_info: ${DEPLOY_INFO_URL:-未設定}
          Actions: ${RUN_URL}
          [/info]"

          curl --fail-with-body -X POST \
            -H "x-chatworktoken: ${CHATWORK_API_TOKEN}" \
            --data-urlencode "body=${MESSAGE}" \
            "https://api.chatwork.com/v2/rooms/${CHATWORK_ROOM_ID}/messages"

          if [ "$VERIFY_RESULT" = "失敗" ]; then
            exit 1
          fi
